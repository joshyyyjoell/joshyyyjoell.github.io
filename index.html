<!DOCTYPE html>
<html>
<head>
    <title>Virtual Electronics Lab</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚡ Virtual Electronics Lab ⚡</h1>

<p>Drag components and connect them.</p>

<button id="simulateBtn">Simulate Circuit</button>

<div id="workspace">

    <div class="component" id="battery" style="left:50px;top:200px;">
        🔋 Battery
    </div>

    <div class="component" id="switch" style="left:250px;top:200px;">
        🔘 Switch
    </div>

    <div class="component" id="led" style="left:450px;top:100px;">
        💡 LED
    </div>

    <div class="component" id="motor" style="left:450px;top:300px;">
        ⚙️ Motor
    </div>

    <svg id="wireLayer"></svg>

</div>

<div id="status">
Waiting for simulation...
</div>

<script src="script.js"></script>

</body>
</html>
