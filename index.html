<!DOCTYPE html>
<html>
<head>
    <title>ElectroBot</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#111;
            color:white;
            text-align:center;
        }

        #chatbox{
            width:80%;
            max-width:600px;
            height:400px;
            margin:20px auto;
            border:2px solid cyan;
            overflow-y:auto;
            padding:10px;
            text-align:left;
        }

        input{
            width:70%;
            padding:10px;
        }

        button{
            padding:10px 20px;
            cursor:pointer;
        }

        .user{
            color:yellow;
        }

        .bot{
            color:cyan;
        }
    </style>
</head>
<body>

<h1>⚡ ElectroBot ⚡</h1>

<div id="chatbox">
    <div class="bot"><b>Bot:</b> Ask me about electronics!</div>
</div>

<input type="text" id="userInput" placeholder="Type here...">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage(){

    let input=document.getElementById("userInput");
    let msg=input.value.toLowerCase();

    let chat=document.getElementById("chatbox");

    chat.innerHTML += "<div class='user'><b>You:</b> "+msg+"</div>";

    let reply="I don't know that yet.";

    if(msg.includes("ohm law")){
        reply="Ohm's Law: V = I × R";
    }
    else if(msg.includes("resistor")){
        reply="A resistor limits current flow in a circuit.";
    }
    else if(msg.includes("led")){
        reply="LED stands for Light Emitting Diode.";
    }
    else if(msg.includes("capacitor")){
        reply="A capacitor stores electrical charge.";
    }
    else if(msg.includes("transistor")){
        reply="A transistor acts as a switch or amplifier.";
    }
    else if(msg.includes("hello")){
        reply="Hello! I'm ElectroBot.";
    }

    chat.innerHTML += "<div class='bot'><b>Bot:</b> "+reply+"</div>";

    input.value="";
    chat.scrollTop=chat.scrollHeight;
}
</script>

</body>
</html>
